# Пример: статика панели на panel.yeppie.maks1mio.su
# Скопируй dist/ в /var/www/yeppie-panel и подключи этот server {} в nginx.

server {
    listen 443 ssl http2;
    server_name panel.yeppie.maks1mio.su;

    root /var/www/yeppie-panel;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ssl_certificate / ssl_certificate_key — как у остальных серверов на этом VPS
}
