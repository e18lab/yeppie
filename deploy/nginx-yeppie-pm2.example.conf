# Скопируй в /etc/nginx/sites-available/yeppie-panel.conf
# sudo ln -s /etc/nginx/sites-available/yeppie-panel.conf /etc/nginx/sites-enabled/
# sudo nginx -t && sudo systemctl reload nginx
#
# Certbot не смог сам вставить ssl — пока не было server_name panel... (см. ниже).
# PM2: yeppie на 127.0.0.1:4173

# Редирект HTTP → HTTPS (опционально; :80 может понадобиться certbot для renew)
server {
    listen 80;
    listen [::]:80;
    server_name panel.yeppie.maks1mio.su;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name panel.yeppie.maks1mio.su;

    ssl_certificate     /etc/letsencrypt/live/panel.yeppie.maks1mio.su/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/panel.yeppie.maks1mio.su/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    # Если есть: ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:4173;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
