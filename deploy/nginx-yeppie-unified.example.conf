# Один сайт Yeppie (PM2 :4173) на нескольких именах + /panel внутри SPA.
#
# Сертификат выдаётся на ИМЕНА ХОСТОВ, не на путь: /panel — это маршрут React Router.
#
# --- Вариант A (без wildcard): HTTP-01, перечисли все нужные поддомены ---
#   sudo certbot certonly --nginx \
#     -d yeppie.maks1mio.su \
#     -d panel.yeppie.maks1mio.su
# Путь к файлам смотри: sudo certbot certificates
# Обычно: /etc/letsencrypt/live/yeppie.maks1mio.su/  (первое имя в списке)
#
# --- Вариант B: wildcard *.yeppie.maks1mio.su ---
# Только DNS-01 (TXT _acme-challenge.yeppie.maks1mio.su). В панели Timeweb TXT
# добавляют в разделе DNS записей, не через «Поддомены».
# В один cert часто: -d "yeppie.maks1mio.su" -d "*.yeppie.maks1mio.su"
#
# Ниже подставь свой fullchain/privkey после выпуска объединённого сертификата.

# HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name yeppie.maks1mio.su *.yeppie.maks1mio.su;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    # apex + все поддомены yeppie (нужен cert с SAN/wildcard)
    server_name yeppie.maks1mio.su *.yeppie.maks1mio.su;

    # Замени на путь от certbot после объединения имён (пример):
    ssl_certificate     /etc/letsencrypt/live/yeppie.maks1mio.su/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yeppie.maks1mio.su/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;

    location / {
        proxy_pass http://127.0.0.1:4173;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
